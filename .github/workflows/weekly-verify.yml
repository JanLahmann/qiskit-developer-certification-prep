name: Weekly drift watchdog

# The freshness engine: re-prove the whole question bank against the pinned
# stack, probe the latest Qiskit for breakage BEFORE we bump the pin, and
# check that every official link learners rely on is still alive. Opens an
# issue when something drifts.

on:
  schedule:
    - cron: '17 5 * * 1' # Mondays 05:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  verify-pinned:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pipeline/requirements.lock
      - name: Install pinned stack
        run: |
          python -m venv .venv
          .venv/bin/pip install -q -r pipeline/requirements.lock
      - name: Re-prove question bank (pinned)
        run: .venv/bin/python pipeline/verify_bank.py --check --jobs 4 --summary-json pinned-summary.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pinned-summary
          path: pinned-summary.json

  probe-latest:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install LATEST stack (unpinned probe)
        run: |
          python -m venv .venv
          .venv/bin/pip install -q "qiskit[visualization]" qiskit-aer qiskit-ibm-runtime jsonschema
          .venv/bin/python -c "import importlib.metadata as m; print('probe:', m.version('qiskit'), m.version('qiskit-aer'), m.version('qiskit-ibm-runtime'))"
      - name: Re-prove question bank (latest)
        run: .venv/bin/python pipeline/verify_bank.py --check --jobs 4 --summary-json latest-summary.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: latest-summary
          path: latest-summary.json

  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check official resource links
        run: python pipeline/check_links.py --report links-summary.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: links-summary
          path: links-summary.json

  report:
    needs: [verify-pinned, probe-latest, check-links]
    if: always() && (needs.verify-pinned.result == 'failure' || needs.check-links.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Open drift issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Drift watchdog: failures detected (${new Date().toISOString().slice(0,10)})`;
            const body = [
              'The weekly drift watchdog found problems:',
              '',
              `- verify-pinned: ${{ toJSON(needs.verify-pinned.result) }}`,
              `- probe-latest: ${{ toJSON(needs.probe-latest.result) }} (advisory)`,
              `- check-links: ${{ toJSON(needs.check-links.result) }}`,
              '',
              `See run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Stale questions must be regenerated or fixed before the next release build.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['drift-watchdog'],
            });
